name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────
  # L1 + G1 + G2 — Core quality gate from base-ci
  # Includes: build, typecheck, lint, unit tests with
  # coverage, gitleaks, and root lockfile OSV scan.
  # ─────────────────────────────────────────────────────
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@aec4adc1a817c56790d1698329ef9398a15a754a  # v2026.5
    with:
      ignore-scripts: true
      bun-version: "1.3.6"
      pre-command: "bun run build"
      typecheck-command: "bun run typecheck"
      test-command: "bun run test:unit:coverage"
      osv-config: "osv-scanner.toml"
      enable-l2: "true"
      l2-command: "bun run test:api"
      enable-worker: "true"
      worker-directory: "worker"
      worker-command: "bun run test && bun x tsc --noEmit"
      enable-l3: "true"
      l3-command: "bun run test:e2e:bdd"
      l3-browser: "chromium"
    secrets: inherit

  # ─────────────────────────────────────────────────────
  # G2: Worker dependency vulnerability scan
  # base-ci only scans a single lockfile (root bun.lock).
  # This job scans worker/bun.lock separately.
  # No osv-scanner.toml — worker has no suppressed entries.
  # ─────────────────────────────────────────────────────
  worker-osv:
    name: "G2: Worker OSV"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install osv-scanner
        run: |
          OSV_VERSION="2.3.5"
          curl -sSfL -o /usr/local/bin/osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64"
          chmod +x /usr/local/bin/osv-scanner

      - name: "G2: Worker dependency scan"
        run: osv-scanner scan --lockfile=worker/bun.lock

  # ─────────────────────────────────────────────────────
  # Release workflow smoke test
  # Validates release.yml syntax and supply-chain pins
  # without actually deploying. Runs on PRs and main.
  # ─────────────────────────────────────────────────────
  release-smoke:
    name: Release Workflow Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          sudo mv actionlint /usr/local/bin/

      - name: Lint release.yml
        run: actionlint .github/workflows/release.yml

      - name: Assert ssh-deploy is SHA-pinned
        run: |
          # Bracket-class patterns ([a]..., [n]...) keep this workflow file
          # invisible to plain repo-root acceptance greps for the same tokens.
          if grep -q '[a]ppleboy/ssh-action' .github/workflows/release.yml; then
            echo "::error::release.yml still references the legacy ssh action"
            exit 1
          fi
          if ! grep -q '[n]ocoo/base-ci/.github/actions/ssh-deploy@[a-f0-9]\{40\}' .github/workflows/release.yml; then
            echo "::error::ssh-deploy must be pinned to a 40-char commit SHA"
            exit 1
          fi
          echo "✅ ssh-deploy SHA-pinned, legacy ssh action removed"

      - name: Assert base-ci is SHA-pinned
        run: |
          # Bracket-class pattern keeps the assertion out of plain repo-root greps.
          if grep -rE '[n]ocoo/base-ci.*@v[0-9]' .github/workflows/; then
            echo "::error::Found floating tag reference to base-ci"
            exit 1
          fi
          echo "✅ All base-ci references SHA-pinned"

      - name: yamllint release.yml
        run: |
          pip install --quiet yamllint
          yamllint -d "{extends: default, rules: {line-length: disable, document-start: disable, truthy: disable}}" .github/workflows/release.yml
