name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@v2026.1
    with:
      pre-command: "bun run build"
      test-command: "bun run test:coverage"
      typecheck-command: "true"
      enable-l2: "false"
    secrets: inherit
